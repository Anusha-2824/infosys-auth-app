<!DOCTYPE html>
<html>
<head>
    <title>Inventra Login</title>
</head>

<body bgcolor="black" style="color:white; font-family:Arial">

<center>
<h1>Inventra Login</h1>

<form onsubmit="return loginCheck()">
<table bgcolor="#1e1e1e" cellpadding="15">

<tr>
<td>
<label>Username *</label><br>
<input type="text" id="loginUser" required>
</td>
</tr>

<tr>
<td>
<label>Password *</label><br>
<input type="password" id="loginPass" required>
</td>
</tr>

<tr>
<td align="center">
<input type="submit" value="Login">
<input type="button" value="Sign Up" onclick="goSignup()">
</td>
</tr>

</table>
</form>

<p id="loginMsg" style="color:red"></p>

</center>

<script>

document.addEventListener("DOMContentLoaded", function() {
    console.log("JS Loaded");

    const form = document.querySelector("form");

    form.addEventListener("submit", async function(event) {
        event.preventDefault();   // 🔥 This is important

        console.log("Form Submitted");

        const username = document.getElementById("loginUser").value;
        const password = document.getElementById("loginPass").value;

        try {

            const response = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            });

            const result = await response.text();

            console.log("Status:", response.status);
            console.log("Response:", result);

            if (!response.ok) {
                document.getElementById("loginMsg").innerText = result;
                return;
            }

            localStorage.setItem("token", result);
            console.log("Token saved");

            window.location.href = "dashboard.html";

        } catch (error) {
            document.getElementById("loginMsg").innerText = "Server not reachable";
        }

    });
});

function goSignup() {
    window.location.href = "signup.html";
}

</script>



</body>
</html>
