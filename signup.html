<!DOCTYPE html>
<html>
<head>
    <title>Inventra Signup</title>
</head>

<body bgcolor="black" style="color:white; font-family:Arial">

<center>
<h1>Create Account</h1>

<form onsubmit="return registerUser()">
<table bgcolor="#1e1e1e" cellpadding="15">

<tr>
<td>
<label>Username *</label><br>
<input type="text" id="username" required>
</td>
</tr>

<tr>
<td>
<label>Email *</label><br>
<input type="email" id="email" required>
</td>
</tr>

<tr>
<td>
<label>Password *</label><br>
<input type="password" id="password" required>
</td>
</tr>

<tr>
<td>
<label>Role *</label><br>
<select id="role">
    <option value="EMPLOYEE">EMPLOYEE</option>
    <option value="ADMIN">ADMIN</option>
</select>
</td>
</tr>

<tr>
<td align="center">
<input type="submit" value="Register">
<input type="button" value="Back to Login" onclick="goLogin()">
</td>
</tr>

</table>
</form>

<p id="msg" style="color:red"></p>

</center>

<script>
async function registerUser() {

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;

    const response = await fetch("http://localhost:8080/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `username=${username}&email=${email}&password=${password}&role=${role}`
    });

    const result = await response.text();

    if (!response.ok) {
        msg.innerText = result;
        return false;
    }

    alert("Registration Successful! Please login.");
    window.location.href = "index.html";
    return false;
}

function goLogin() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
